name: Build APK

on:
  push:
    branches: [ main, master, develop ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Java ────────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── Gradle Wrapper ──────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # ── Cache ───────────────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── Lint ────────────────────────────────────────────────────────────────
      - name: Run lint
        run: ./gradlew lintDebug --stacktrace
        continue-on-error: true

      # ── Build Debug APK ─────────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── Build Release APK (unsigned, for PR / push to non-tag) ─────────────
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      # ── Sign Release APK (only on tag push, if secrets are configured) ─────
      - name: Sign Release APK
        if: startsWith(github.ref, 'refs/tags/v') && env.SIGNING_KEY != ''
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}

      # ── Rename APKs ─────────────────────────────────────────────────────────
      - name: Rename APKs for upload
        run: |
          VERSION_NAME=$(./gradlew -q printVersionName 2>/dev/null || echo "1.0.0")
          mkdir -p artifacts
          find app/build/outputs/apk -name "*.apk" | while read f; do
            FLAVOR=$(echo "$f" | grep -oE 'debug|release')
            cp "$f" "artifacts/WebDavMusic-${FLAVOR}-${GITHUB_SHA::7}.apk"
          done
          ls -lh artifacts/

      # ── Upload Debug APK ────────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: WebDavMusic-debug-${{ github.sha }}
          path: artifacts/WebDavMusic-debug-*.apk
          retention-days: 30

      # ── Upload Release APK ──────────────────────────────────────────────────
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: WebDavMusic-release-${{ github.sha }}
          path: artifacts/WebDavMusic-release-*.apk
          retention-days: 90

      # ── Create GitHub Release (on tag) ──────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
          body: |
            ## WebDAV Music ${{ github.ref_name }}

            ### 安装说明
            - **Android TV / 盒子**: 安装 `release` 版本，使用遥控器导航
            - **车机 (AAOS)**: 安装 `release` 版本，支持旋钮/触控
            - **调试版**: 安装 `debug` 版本（包含日志）

            ### 支持格式
            MP3 · FLAC · WAV · AAC · M4A · OPUS

            ### 功能
            - WebDAV 多账户在线流媒体播放（无需下载）
            - 一键扫描自动生成播放列表
            - D-pad / 遥控器 / 旋钮 / 触控全适配
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Optional: build summary ──────────────────────────────────────────────────
  notify:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Print result
        run: |
          echo "Build status: ${{ needs.build.result }}"
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ APK built successfully. Download from the Actions artifacts tab."
          else
            echo "❌ Build failed. Check the logs above."
          fi
